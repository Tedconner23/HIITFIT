<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fafafa" />
    <title>Workout</title>
  </head>
  <body class="bg-neutral-50 text-neutral-900 antialiased">
    <script type="module" src="/src/landing/main.js"></script>
    <main class="mx-auto flex min-h-dvh max-w-md flex-col px-6 py-16">
      <div class="flex flex-1 flex-col justify-center">
        <div class="mb-8 flex h-14 w-14 items-center justify-center rounded-2xl bg-neutral-900">
          <svg viewBox="0 0 32 32" class="h-8 w-8" fill="#fafafa" aria-hidden="true">
            <rect x="5" y="14" width="2.2" height="4" rx="1" />
            <rect x="7.2" y="12" width="2.2" height="8" rx="1" />
            <rect x="9" y="14.8" width="14" height="2.4" rx="1" />
            <rect x="22.6" y="12" width="2.2" height="8" rx="1" />
            <rect x="24.8" y="14" width="2.2" height="4" rx="1" />
          </svg>
        </div>

        <h1 class="text-4xl font-semibold tracking-tight">Workout</h1>
        <p class="mt-3 text-lg text-neutral-500">
          Plan, build, and perform your workouts — right from your phone.
        </p>

        <ul class="mt-8 flex flex-col gap-3 text-neutral-600">
          <li class="flex items-center gap-3">
            <span class="text-neutral-400">—</span> Build reusable workout templates
          </li>
          <li class="flex items-center gap-3">
            <span class="text-neutral-400">—</span> Check off sets as you train
          </li>
          <li class="flex items-center gap-3">
            <span class="text-neutral-400">—</span> Works offline, no account needed
          </li>
        </ul>

        <a
          href="/app/"
          class="mt-10 rounded-full bg-neutral-900 px-8 py-4 text-center font-medium text-white transition hover:bg-neutral-800"
        >
          Open the app
        </a>
        <p class="mt-3 text-center text-sm text-neutral-400">
          Tip: add it to your home screen to install.
        </p>
      </div>
    </main>
  </body>
</html>
